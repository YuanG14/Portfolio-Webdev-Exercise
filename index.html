<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Portfolio</title>

  <!-- Tailwind CSS (CDN) -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Custom CSS (for anything Tailwind can't handle cleanly) -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">

  <!-- ============================= -->
  <!-- NAVBAR SECTION                -->
  <!-- ============================= -->
  <header class="bg-white shadow-md fixed top-0 left-0 w-full z-50">
    <nav class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between items-center h-16">

        <!-- Logo / Brand -->
        <div class="flex-shrink-0">
          <a href="#" class="text-xl font-bold text-indigo-600">MyPortfolio</a>
        </div>

        <!-- Desktop Nav Links -->
        <div class="hidden md:flex space-x-8">
          <a href="#home" class="text-gray-700 hover:text-indigo-600 transition-colors">Home</a>
          <a href="#portfolio" class="text-gray-700 hover:text-indigo-600 transition-colors">Portfolio</a>
          <a href="#contact" class="text-gray-700 hover:text-indigo-600 transition-colors">Contact</a>
        </div>

        <!-- Mobile Menu Button (hamburger) -->
        <div class="md:hidden">
          <button id="navToggleBtn" aria-label="Toggle navigation menu" aria-expanded="false" class="text-gray-700 hover:text-indigo-600 focus:outline-none">
            <!-- Hamburger Icon (SVG) -->
            <svg id="iconHamburger" class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
            <!-- Close Icon (SVG), hidden by default -->
            <svg id="iconClose" class="h-6 w-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

      </div>
    </nav>

    <!-- Mobile Nav Links (collapsed by default) -->
    <div id="mobileMenu" class="hidden md:hidden bg-white border-t border-gray-100">
      <div class="px-4 pt-2 pb-4 space-y-1">
        <a href="#home" class="block py-2 text-gray-700 hover:text-indigo-600 transition-colors">Home</a>
        <a href="#portfolio" class="block py-2 text-gray-700 hover:text-indigo-600 transition-colors">Portfolio</a>
        <a href="#contact" class="block py-2 text-gray-700 hover:text-indigo-600 transition-colors">Contact</a>
      </div>
    </div>
  </header>

  <!-- ============================= -->
  <!-- MAIN CONTENT PLACEHOLDER      -->
  <!-- ============================= -->
  <main class="pt-16">
    <!-- Sections (Hero, Portfolio, Contact, etc.) will be added in later phases -->
  </main>

  <!-- Custom JavaScript -->
  <script src="js/main.js"></script>

</body>
</html>
